version: 2

sources:
  - name: bronze
    database: fraud          # catalog
    schema: bronze
    description: >
      Raw, append-only landing tables written by Auto Loader. No transformations
      are applied here — Silver is the first place business logic lives.
    freshness:
      warn_after: { count: 12, period: hour }
      error_after: { count: 24, period: hour }
    loaded_at_field: _ingest_ts
    tables:
      - name: raw_transactions
        description: One row per card transaction event.
        columns:
          - name: transaction_id
            description: Natural key of a transaction.
            tests: [not_null]
          - name: card_id
            tests: [not_null]
          - name: amount
            tests:
              - not_null
      - name: raw_auth_events
        description: Authorisation decision (approve/decline) per transaction.
        columns:
          - name: transaction_id
            tests: [not_null]
      - name: raw_chargebacks
        description: Late-arriving disputes/confirmed-fraud labels.
        columns:
          - name: chargeback_id
            tests: [not_null, unique]
          - name: transaction_id
            tests: [not_null]
      - name: raw_accounts
        columns:
          - name: account_id
            tests: [not_null, unique]
      - name: raw_cards
        columns:
          - name: card_id
            tests: [not_null, unique]
      - name: raw_merchants
        columns:
          - name: merchant_id
            tests: [not_null, unique]
