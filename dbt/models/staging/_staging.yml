version: 2

models:
  - name: stg_transactions
    description: Cleaned, typed transactions (one row per transaction event).
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: card_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_cards')
              field: card_id
      - name: amount_usd
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: entry_mode
        tests:
          - accepted_values:
              values: ['chip', 'contactless', 'swipe', 'online']

  - name: stg_auth_events
    columns:
      - name: transaction_id
        tests: [not_null, unique]

  - name: stg_chargebacks
    columns:
      - name: chargeback_id
        tests: [not_null, unique]
      - name: transaction_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_transactions')
              field: transaction_id

  - name: stg_cards
    columns:
      - name: card_id
        tests: [not_null, unique]
      - name: account_id
        tests:
          - relationships:
              to: ref('stg_accounts')
              field: account_id

  - name: stg_accounts
    columns:
      - name: account_id
        tests: [not_null, unique]

  - name: stg_merchants
    columns:
      - name: merchant_id
        tests: [not_null, unique]
      - name: baseline_fraud_rate
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
