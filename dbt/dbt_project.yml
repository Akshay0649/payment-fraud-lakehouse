name: "fraud_lakehouse"
version: "1.0.0"
config-version: 2

profile: "fraud_lakehouse"

model-paths: ["models"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  fraud_lakehouse:
    staging:
      +materialized: view
      +schema: silver
    intermediate:
      +materialized: ephemeral
      +schema: silver
    marts:
      +materialized: table
      +schema: gold

snapshots:
  fraud_lakehouse:
    +target_schema: silver
    +file_format: delta
